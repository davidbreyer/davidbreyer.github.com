<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Not Found - David Breyer</title>
  <meta name="color-scheme" content="dark">
  <style>
    :root {
      --bg: #090b0b;
      --text: #e8ece7;
      --muted: #9ca59d;
      --line: #202925;
      --green: #8fd17f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      display: grid;
      min-height: 100vh;
      margin: 0;
      place-items: center;
      color: var(--text);
      background: var(--bg);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(100% - 32px, 620px);
      border-top: 1px solid var(--line);
      padding-top: 28px;
    }

    p:first-child {
      margin: 0 0 12px;
      color: var(--green);
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 0.88rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.4rem, 10vw, 5rem);
      line-height: 0.96;
      letter-spacing: 0;
    }

    p {
      color: var(--muted);
      line-height: 1.6;
    }

    a {
      color: var(--text);
      text-underline-offset: 0.25em;
    }
  </style>
</head>
<body>
  <main>
    <p>status: 404</p>
    <h1>Nothing here.</h1>
    <p>This page is gone, or maybe it was part of the old blog cleanup.</p>
    <p><a href="./">Back to davidbreyer.com</a></p>
  </main>
</body>
</html>
